<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <g id="sparkle" stroke="#F9A602" stroke-width="2" fill="none" opacity="0.4">
      <path d="M10,0 Q10,10 20,10 Q10,10 10,20 Q10,10 0,10 Q10,10 10,0" />
    </g>
    <g id="dot" fill="#E30613" opacity="0.3">
      <circle cx="2" cy="2" r="2" />
    </g>

    <!-- Shawarma Roll -->
    <g id="shawarma" stroke="#E30613" stroke-width="2" fill="none" opacity="0.15">
      <path d="M15,5 C10,5 5,10 5,20 L5,40 C5,50 10,55 15,55 L25,55 C30,55 35,50 35,40 L35,20 C35,10 30,5 25,5 Z" />
      <path d="M5,25 L35,25 M5,35 L35,35" stroke-dasharray="2 2"/>
      <path d="M2,30 Q20,40 38,30" />
    </g>

    <!-- French Fries -->
    <g id="fries" stroke="#E30613" stroke-width="2" fill="none" opacity="0.15">
      <path d="M10,25 L15,55 L35,55 L40,25 Z" />
      <rect x="15" y="10" width="4" height="15" rx="2" />
      <rect x="22" y="5" width="4" height="20" rx="2" />
      <rect x="29" y="12" width="4" height="13" rx="2" />
      <path d="M15,35 L35,35" stroke="#F9A602" opacity="0.6"/>
    </g>

    <!-- Soft Drink -->
    <g id="drink" stroke="#E30613" stroke-width="2" fill="none" opacity="0.15">
      <path d="M12,20 L16,55 L34,55 L38,20" />
      <path d="M10,20 L40,20" />
      <path d="M14,10 C20,5 30,5 36,10 Z" />
      <path d="M25,10 L30,0" stroke-width="3" stroke="#F9A602" opacity="0.6"/>
    </g>

    <!-- Tea/Coffee Cup -->
    <g id="cup" stroke="#E30613" stroke-width="2" fill="none" opacity="0.15">
      <path d="M10,20 L10,45 C10,50 15,55 25,55 C35,55 40,50 40,45 L40,20 Z" />
      <path d="M40,25 C48,25 48,40 40,40" />
      <path d="M15,10 Q20,0 25,10 T35,10" stroke="#F9A602" opacity="0.6"/>
    </g>

    <!-- Lemon Slice -->
    <g id="lemon" stroke="#E30613" stroke-width="2" fill="none" opacity="0.15">
      <circle cx="25" cy="25" r="20" />
      <circle cx="25" cy="25" r="15" stroke-dasharray="4 2"/>
      <path d="M25,5 L25,45 M5,25 L45,25 M11,11 L39,39 M11,39 L39,11" stroke-width="1"/>
    </g>
    
    <!-- Mint Leaves -->
    <g id="mint" stroke="#E30613" stroke-width="2" fill="none" opacity="0.15">
      <path d="M25,45 C15,35 5,25 15,15 C25,5 35,15 25,25 C15,35 25,45 25,45 Z" />
      <path d="M25,45 C35,35 45,25 35,15 C25,5 15,15 25,25 C35,35 25,45 25,45 Z" />
    </g>

    <!-- Sauce Bowl -->
    <g id="sauce" stroke="#E30613" stroke-width="2" fill="none" opacity="0.15">
      <path d="M5,20 C5,40 45,40 45,20 Z" />
      <ellipse cx="25" cy="20" rx="20" ry="5" stroke="#F9A602" opacity="0.6"/>
    </g>
  </defs>

  <rect width="100%" height="100%" fill="transparent" />

  <!-- Grid placement with random rotations -->
  <!-- Row 1 -->
  <use href="#shawarma" x="20" y="20" transform="rotate(-15 40 40)" />
  <use href="#fries" x="140" y="30" transform="rotate(10 160 50)" />
  <use href="#lemon" x="260" y="10" transform="rotate(-5 285 35)" />
  <use href="#cup" x="360" y="40" transform="rotate(15 385 65)" />

  <!-- Row 2 -->
  <use href="#drink" x="80" y="120" transform="rotate(18 100 145)" />
  <use href="#sauce" x="200" y="140" transform="rotate(-12 225 150)" />
  <use href="#mint" x="320" y="110" transform="rotate(8 345 135)" />
  <use href="#shawarma" x="-20" y="130" transform="rotate(10 0 150)" />

  <!-- Row 3 -->
  <use href="#fries" x="40" y="240" transform="rotate(-8 60 265)" />
  <use href="#cup" x="160" y="220" transform="rotate(20 185 245)" />
  <use href="#lemon" x="280" y="250" transform="rotate(-15 305 275)" />
  <use href="#drink" x="380" y="230" transform="rotate(5 405 255)" />

  <!-- Row 4 -->
  <use href="#mint" x="100" y="340" transform="rotate(-18 125 365)" />
  <use href="#shawarma" x="220" y="320" transform="rotate(12 240 340)" />
  <use href="#sauce" x="340" y="350" transform="rotate(-10 365 360)" />
  <use href="#fries" x="-40" y="330" transform="rotate(15 -20 350)" />

  <!-- Sparkles -->
  <use href="#sparkle" x="100" y="50" />
  <use href="#sparkle" x="250" y="100" />
  <use href="#sparkle" x="350" y="180" />
  <use href="#sparkle" x="150" y="300" />
  <use href="#sparkle" x="30" y="200" />
  <use href="#sparkle" x="280" y="320" />

  <!-- Dots -->
  <use href="#dot" x="50" y="100" />
  <use href="#dot" x="180" y="80" />
  <use href="#dot" x="320" y="60" />
  <use href="#dot" x="80" y="200" />
  <use href="#dot" x="220" y="180" />
  <use href="#dot" x="380" y="150" />
  <use href="#dot" x="120" y="280" />
  <use href="#dot" x="240" y="270" />
  <use href="#dot" x="340" y="290" />
  <use href="#dot" x="60" y="380" />
  <use href="#dot" x="200" y="390" />
</svg>
